name: Daily Devotional Newsletter Dispatcher

on:
  schedule:
    # Executa todos os dias às 09:00 UTC (06:00 Horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Permite disparar manualmente pelo painel do GitHub

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r newsletter/requirements.txt

      - name: Run Newsletter Dispatcher
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          PIX_KEY: ${{ secrets.PIX_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        run: python newsletter/main.py
